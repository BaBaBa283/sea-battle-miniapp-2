<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=360, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Морской бой</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <!-- Шапка -->
        <div id="header">
            <h1>Морской бой</h1>
            <div id="status">🎯 Ваш ход</div>
        </div>

        <!-- Игровые поля (друг под другом) -->
        <div id="game-container">
            <div id="player-board">
                <h3>🚢 Ваше поле</h3>
                <div id="player-grid" class="grid-container"></div>
            </div>

            <div id="computer-board">
                <h3>🎯 Поле противника</h3>
                <div id="computer-grid" class="grid-container"></div>
            </div>
        </div>

        <!-- Кнопки управления -->
        <div id="controls">
            <button id="new-game-btn" class="btn-primary">🔄 Новая игра</button>
            <button id="close-btn" class="btn-secondary">⬅️ Закрыть</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
